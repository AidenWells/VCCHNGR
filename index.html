<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VØICE MØRPH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #050508;
    --panel: #0a0a12;
    --border: #1a1a2e;
    --accent: #00ffcc;
    --accent2: #ff0066;
    --accent3: #6600ff;
    --text: #c8d0e0;
    --glow: 0 0 20px rgba(0,255,204,0.4);
    --glow2: 0 0 20px rgba(255,0,102,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Animated grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(102,0,255,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 0.15em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,255,204,0.5));
    animation: logoFlicker 4s ease-in-out infinite;
  }

  @keyframes logoFlicker {
    0%,100% { filter: drop-shadow(0 0 30px rgba(0,255,204,0.5)); }
    50% { filter: drop-shadow(0 0 50px rgba(0,255,204,0.8)) drop-shadow(0 0 80px rgba(102,0,255,0.4)); }
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: rgba(200,208,224,0.4);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Visualizer */
  .viz-wrap {
    position: relative;
    margin-bottom: 40px;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: var(--panel);
  }

  #visualizer {
    display: block;
    width: 100%;
    height: 120px;
  }

  .viz-label {
    position: absolute;
    top: 10px; left: 14px;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--accent);
    opacity: 0.6;
  }

  .status-dot {
    position: absolute;
    top: 12px; right: 14px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* Record button */
  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 44px;
    align-items: center;
  }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    padding: 14px 28px;
    border: 1px solid;
    background: transparent;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: currentColor;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .btn:hover::before { opacity: 0.08; }
  .btn:active::before { opacity: 0.18; }

  .btn-record {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 0 rgba(255,0,102,0);
  }
  .btn-record.recording {
    border-color: var(--accent2);
    box-shadow: var(--glow2), inset 0 0 20px rgba(255,0,102,0.1);
    animation: recPulse 0.8s ease-in-out infinite;
  }
  @keyframes recPulse {
    0%,100%{box-shadow: 0 0 8px rgba(255,0,102,0.6)}
    50%{box-shadow: 0 0 30px rgba(255,0,102,1), inset 0 0 20px rgba(255,0,102,0.2)}
  }

  .btn-play {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn-play:hover { box-shadow: var(--glow); }

  .btn-download {
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .btn-download:hover { box-shadow: 0 0 20px rgba(102,0,255,0.5); }

  /* Effects Grid */
  .section-label {
    font-size: 9px;
    letter-spacing: 0.5em;
    color: rgba(200,208,224,0.35);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .effects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 44px;
  }

  .effect-card {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 18px 16px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .effect-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--effect-color, var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }

  .effect-card:hover { border-color: rgba(200,208,224,0.15); }
  .effect-card:hover::before { transform: scaleX(0.5); }
  .effect-card.active {
    border-color: var(--effect-color, var(--accent));
    background: rgba(0,255,204,0.04);
    box-shadow: 0 0 20px rgba(0,255,204,0.1);
  }
  .effect-card.active::before { transform: scaleX(1); }

  .effect-icon {
    font-size: 26px;
    margin-bottom: 10px;
    display: block;
  }

  .effect-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    color: #fff;
    margin-bottom: 4px;
  }

  .effect-desc {
    font-size: 9px;
    letter-spacing: 0.1em;
    color: rgba(200,208,224,0.4);
    line-height: 1.5;
  }

  .effect-badge {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 7px;
    letter-spacing: 0.2em;
    padding: 3px 6px;
    border: 1px solid;
    opacity: 0.7;
  }

  /* Sliders */
  .knobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .knob-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 16px;
  }

  .knob-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(200,208,224,0.5);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .knob-label span {
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    cursor: pointer;
    border-radius: 0;
    transition: box-shadow 0.1s;
  }
  input[type=range]:hover::-webkit-slider-thumb {
    box-shadow: 0 0 16px var(--accent);
  }

  /* Glitch text for "NONE" effect */
  .none-active .logo {
    animation: logoFlicker 0.3s steps(1) infinite;
  }

  /* Message bar */
  .msg {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.25em;
    height: 20px;
    color: rgba(200,208,224,0.4);
    margin-top: -30px;
    margin-bottom: 20px;
    transition: color 0.3s;
  }
  .msg.ok { color: var(--accent); }
  .msg.err { color: var(--accent2); }

  /* scanline */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.15;
    animation: scan 6s linear infinite;
    pointer-events: none;
    z-index: 100;
  }
  @keyframes scan { 0%{top:-2px} 100%{top:100vh} }

</style>
</head>
<body>

<div class="scanline"></div>

<div class="container">
  <header>
    <div class="logo">VØICE MØRPH</div>
    <div class="tagline">Neural Audio Mutation Engine · Unreleased Effects</div>
  </header>

  <div class="viz-wrap">
    <span class="viz-label">SIGNAL MONITOR</span>
    <div class="status-dot" id="statusDot"></div>
    <canvas id="visualizer"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-record" id="btnRecord">⬤ RECORD</button>
    <button class="btn btn-play" id="btnPlay" disabled>▶ PLAY MORPHED</button>
    <button class="btn btn-download" id="btnDownload" disabled>↓ EXPORT</button>
  </div>

  <div class="msg" id="msg">SELECT AN EFFECT · THEN HOLD RECORD TO CAPTURE</div>

  <div class="section-label">MUTATION EFFECTS</div>

  <div class="effects-grid" id="effectsGrid">
    <!-- Injected by JS -->
  </div>

  <div class="section-label">MODULATION PARAMETERS</div>

  <div class="knobs-grid" id="knobsGrid">
    <!-- Injected by JS -->
  </div>

</div>

<script>
const EFFECTS = [
  {
    id: 'void_whisperer',
    name: 'VOID WHISPERER',
    icon: '🕳️',
    desc: 'Your voice folded 7 dimensions inward. Barely human.',
    color: '#6600ff',
    badge: 'ALIEN',
    process(ctx, src, dest, params) {
      // Extreme pitch down + ring mod + comb filter chain
      const delay1 = ctx.createDelay(1); delay1.delayTime.value = 0.003;
      const delay2 = ctx.createDelay(1); delay2.delayTime.value = 0.007;
      const delay3 = ctx.createDelay(1); delay3.delayTime.value = 0.013;
      const g1 = ctx.createGain(); g1.gain.value = 0.4;
      const g2 = ctx.createGain(); g2.gain.value = 0.4;
      const g3 = ctx.createGain(); g3.gain.value = 0.4;
      const ring = ctx.createOscillator(); ring.frequency.value = 60 * params.pitch;
      const ringGain = ctx.createGain(); ringGain.gain.value = 0;
      ring.connect(ringGain); ring.start();
      const waveshaper = ctx.createWaveShaper();
      const n = 256; const curve = new Float32Array(n);
      for (let i=0;i<n;i++){const x=2*i/n-1; curve[i]=Math.sign(x)*Math.pow(Math.abs(x),0.3);}
      waveshaper.curve = curve;
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 400 * params.freq;
      src.connect(waveshaper);
      waveshaper.connect(delay1); delay1.connect(g1); g1.connect(delay2);
      delay2.connect(g2); g2.connect(delay3); delay3.connect(g3);
      waveshaper.connect(lp);
      lp.connect(dest); g1.connect(dest); g2.connect(dest); g3.connect(dest);
      waveshaper.connect(ringGain); ringGain.connect(dest);
      return () => { ring.stop(); };
    }
  },
  {
    id: 'bone_conductor',
    name: 'BONE CONDUCTOR',
    icon: '🦴',
    desc: 'Simulates sound traveling through skull bone. Dense & intimate.',
    color: '#c8a060',
    badge: 'BIONIC',
    process(ctx, src, dest, params) {
      // Narrow band resonators mimicking bone conduction (800-3000Hz range)
      const pre = ctx.createBiquadFilter(); pre.type='highpass'; pre.frequency.value=600;
      const r1 = ctx.createBiquadFilter(); r1.type='peaking'; r1.frequency.value=900; r1.gain.value=18; r1.Q.value=8;
      const r2 = ctx.createBiquadFilter(); r2.type='peaking'; r2.frequency.value=1800; r2.gain.value=14; r2.Q.value=10;
      const r3 = ctx.createBiquadFilter(); r3.type='peaking'; r3.frequency.value=2700; r3.gain.value=10; r3.Q.value=12;
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=3200*params.freq;
      const comp = ctx.createDynamicsCompressor(); comp.ratio.value=20; comp.threshold.value=-30;
      const distGain = ctx.createGain(); distGain.gain.value = 0.8 * params.drive;
      src.connect(pre);
      pre.connect(r1); r1.connect(r2); r2.connect(r3); r3.connect(lp);
      lp.connect(distGain); distGain.connect(comp); comp.connect(dest);
    }
  },
  {
    id: 'quantum_echo',
    name: 'QUANTUM ECHO',
    icon: '⚛️',
    desc: 'Probabilistic echo: each repeat spawns 3 branches, collapsing randomly.',
    color: '#00ffcc',
    badge: 'RARE',
    process(ctx, src, dest, params) {
      const branches = 6;
      const gains = [];
      for(let i=0;i<branches;i++){
        const d = ctx.createDelay(4);
        d.delayTime.value = (0.08 + i * 0.11) * params.mix;
        const g = ctx.createGain();
        g.gain.value = Math.pow(0.62, i+1);
        const pan = ctx.createStereoPanner();
        pan.pan.value = (Math.random()*2-1) * 0.8;
        const filt = ctx.createBiquadFilter(); filt.type='bandpass';
        filt.frequency.value = 400 + i*600; filt.Q.value = 0.8;
        src.connect(d); d.connect(filt); filt.connect(g); g.connect(pan); pan.connect(dest);
        gains.push(g);
      }
      // Feedback scramble
      gains[0].connect(gains[2]);
      gains[1].connect(gains[4]);
    }
  },
  {
    id: 'plasma_throat',
    name: 'PLASMA THROAT',
    icon: '🔥',
    desc: 'Vocal tract replaced with ionized gas oscillator. Electric growl.',
    color: '#ff4400',
    badge: 'EXTREME',
    process(ctx, src, dest, params) {
      const ws = ctx.createWaveShaper();
      const k = 300 * params.drive;
      const n = 512; const curve = new Float32Array(n);
      for(let i=0;i<n;i++){const x=2*i/n-1; curve[i]=(1+k/200)*x/(1+k/200*Math.abs(x));}
      ws.curve = curve; ws.oversample='4x';
      const osc = ctx.createOscillator(); osc.frequency.value = 50 + 50*params.pitch;
      osc.type = 'sawtooth';
      const oscGain = ctx.createGain(); oscGain.gain.value = 0.15;
      osc.connect(oscGain); osc.start();
      const ring = ctx.createGain(); ring.gain.value = 1;
      src.connect(ws); ws.connect(ring);
      oscGain.connect(ring.gain);
      const filt = ctx.createBiquadFilter(); filt.type='bandpass'; filt.frequency.value=1200*params.freq; filt.Q.value=4;
      ring.connect(filt); filt.connect(dest);
      src.connect(dest); // dry blend
      return () => osc.stop();
    }
  },
  {
    id: 'liquid_metal',
    name: 'LIQUID METAL',
    icon: '🌊',
    desc: 'Phase vocoder simulation via 16-band chorus with micro-detuning.',
    color: '#aaddff',
    badge: 'FLUID',
    process(ctx, src, dest, params) {
      const bands = 16;
      for(let i=0;i<bands;i++){
        const d = ctx.createDelay(1);
        const rate = 0.3 + i * 0.2 * params.rate;
        const depth = 0.002 + i * 0.0005;
        d.delayTime.value = 0.005 + i * 0.003;
        const lfo = ctx.createOscillator();
        lfo.frequency.value = rate;
        lfo.type = i%2===0 ? 'sine' : 'triangle';
        const lfoGain = ctx.createGain(); lfoGain.gain.value = depth;
        lfo.connect(lfoGain); lfoGain.connect(d.delayTime); lfo.start();
        const g = ctx.createGain(); g.gain.value = 1/bands * params.mix;
        const pan = ctx.createStereoPanner(); pan.pan.value = -1 + (i/(bands-1))*2;
        src.connect(d); d.connect(g); g.connect(pan); pan.connect(dest);
      }
    }
  },
  {
    id: 'cathedral_ai',
    name: 'CATHEDRAL AI',
    icon: '🏛️',
    desc: 'Infinite impulse reverb in a space that cannot physically exist.',
    color: '#9966cc',
    badge: 'SACRED',
    process(ctx, src, dest, params) {
      const convolver = ctx.createConvolver();
      const len = ctx.sampleRate * 5;
      const buf = ctx.createBuffer(2,len,ctx.sampleRate);
      for(let c=0;c<2;c++){
        const data = buf.getChannelData(c);
        for(let i=0;i<len;i++){
          // Non-Euclidean impulse: exponential with harmonic injections
          const env = Math.pow(1-i/len, 2.5 - params.mix);
          const harmonics = Math.sin(i*0.001*params.freq) * 0.3 + Math.sin(i*0.0003)*0.1;
          data[i] = (Math.random()*2-1 + harmonics) * env;
        }
      }
      convolver.buffer = buf;
      const wet = ctx.createGain(); wet.gain.value = 0.85 * params.mix;
      const dry = ctx.createGain(); dry.gain.value = 0.3;
      src.connect(convolver); convolver.connect(wet); wet.connect(dest);
      src.connect(dry); dry.connect(dest);
    }
  },
  {
    id: 'sub_entity',
    name: 'SUB-ENTITY',
    icon: '👁️',
    desc: 'Voice split into 3 personalities: low demon, mid ghost, high spirit.',
    color: '#ff0066',
    badge: 'SPLIT',
    process(ctx, src, dest, params) {
      // Low: demon
      const lp = ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=300;
      const dDelay = ctx.createDelay(1); dDelay.delayTime.value = 0.02;
      const dGain = ctx.createGain(); dGain.gain.value = 2.5 * params.drive;
      const dWs = ctx.createWaveShaper();
      const c1 = new Float32Array(256);
      for(let i=0;i<256;i++){const x=2*i/256-1; c1[i]=Math.tanh(x*8);}
      dWs.curve = c1;
      src.connect(lp); lp.connect(dDelay); dDelay.connect(dWs); dWs.connect(dGain); dGain.connect(dest);

      // Mid: ghost pitch wobble
      const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1500; bp.Q.value=2;
      const gDelay = ctx.createDelay(1); gDelay.delayTime.value=0.008;
      const lfo = ctx.createOscillator(); lfo.frequency.value = 8 * params.rate;
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.002;
      lfo.connect(lfoG); lfoG.connect(gDelay.delayTime); lfo.start();
      const gGain = ctx.createGain(); gGain.gain.value = 0.8;
      const panner = ctx.createStereoPanner(); panner.pan.value = -0.4;
      src.connect(bp); bp.connect(gDelay); gDelay.connect(panner); panner.connect(gGain); gGain.connect(dest);

      // High: spirit shimmer
      const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=4000;
      const sGain = ctx.createGain(); sGain.gain.value = 0.5;
      const sPan = ctx.createStereoPanner(); sPan.pan.value=0.6;
      const sDelay = ctx.createDelay(1); sDelay.delayTime.value=0.035*params.mix;
      src.connect(hp); hp.connect(sDelay); sDelay.connect(sGain); sGain.connect(sPan); sPan.connect(dest);

      return () => lfo.stop();
    }
  },
  {
    id: 'temporal_smear',
    name: 'TEMPORAL SMEAR',
    icon: '🌀',
    desc: 'Words dissolve across time. Speech becomes texture.',
    color: '#00ff88',
    badge: 'GLITCH',
    process(ctx, src, dest, params) {
      const taps = 24;
      let cleanup = [];
      for(let i=0;i<taps;i++){
        const d = ctx.createDelay(4);
        const t = (i/taps) * 1.8 * params.mix;
        d.delayTime.value = t;
        const g = ctx.createGain();
        // Smeared gain envelope
        g.gain.value = Math.sin((i/taps)*Math.PI) * 0.25;
        const pan = ctx.createStereoPanner();
        pan.pan.value = Math.sin(i * 0.7) * 0.9;
        const lfo = ctx.createOscillator();
        lfo.frequency.value = 0.05 + i * 0.02 * params.rate;
        const lfoG = ctx.createGain(); lfoG.gain.value = t * 0.1;
        lfo.connect(lfoG); lfoG.connect(d.delayTime); lfo.start();
        cleanup.push(() => lfo.stop());
        src.connect(d); d.connect(g); g.connect(pan); pan.connect(dest);
      }
      return () => cleanup.forEach(f => f());
    }
  },
  {
    id: 'machine_dreaming',
    name: 'MACHINE DREAMING',
    icon: '🤖',
    desc: 'Your voice as imagined by a synthetic intelligence at 3AM.',
    color: '#ffcc00',
    badge: 'AI',
    process(ctx, src, dest, params) {
      // Spectral freeze sim: many overlapping resonators + glitch stutters
      const resonators = [120,300,600,1000,1700,2800,4500];
      resonators.forEach((f,i) => {
        const r = ctx.createBiquadFilter(); r.type='peaking'; r.frequency.value=f*params.freq; r.gain.value=12; r.Q.value=20;
        const d = ctx.createDelay(2); d.delayTime.value = 0.04 + i*0.03;
        const g = ctx.createGain(); g.gain.value = 0.3;
        const fb = ctx.createGain(); fb.gain.value = 0.7 * params.mix;
        src.connect(r); r.connect(d); d.connect(g); g.connect(dest);
        g.connect(fb); fb.connect(r); // feedback
      });
      // metallic shimmer
      const osc1 = ctx.createOscillator(); osc1.frequency.value = 3700*params.pitch; osc1.type='sine';
      const osc2 = ctx.createOscillator(); osc2.frequency.value = 3701*params.pitch; osc2.type='sine';
      const shimGain = ctx.createGain(); shimGain.gain.value = 0;
      src.connect(shimGain);
      const shimOut = ctx.createGain(); shimOut.gain.value = 0.1;
      osc1.connect(shimOut); osc2.connect(shimOut); shimOut.connect(dest);
      osc1.start(); osc2.start();
      return () => { osc1.stop(); osc2.stop(); };
    }
  },
];

const PARAMS = [
  { id: 'pitch', label: 'PITCH SHIFT', min: 0.2, max: 3, def: 1, step: 0.01, unit: 'x' },
  { id: 'mix', label: 'WET MIX', min: 0, max: 2, def: 1, step: 0.01, unit: '' },
  { id: 'drive', label: 'DRIVE', min: 0.1, max: 5, def: 1, step: 0.01, unit: '' },
  { id: 'freq', label: 'FREQ WARP', min: 0.1, max: 3, def: 1, step: 0.01, unit: 'x' },
  { id: 'rate', label: 'LFO RATE', min: 0.1, max: 5, def: 1, step: 0.01, unit: 'x' },
];

// State
let audioCtx = null;
let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let selectedEffect = EFFECTS[0];
let params = {};
PARAMS.forEach(p => params[p.id] = p.def);
let morphedBlob = null;
let animFrame = null;
let analyser = null;

// Build UI
function buildEffects() {
  const grid = document.getElementById('effectsGrid');
  EFFECTS.forEach(e => {
    const card = document.createElement('div');
    card.className = 'effect-card' + (e.id === selectedEffect.id ? ' active' : '');
    card.style.setProperty('--effect-color', e.color);
    card.innerHTML = `
      <span class="effect-icon">${e.icon}</span>
      <div class="effect-name">${e.name}</div>
      <div class="effect-desc">${e.desc}</div>
      <div class="effect-badge" style="border-color:${e.color};color:${e.color}">${e.badge}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.effect-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      selectedEffect = e;
      showMsg(`EFFECT: ${e.name} SELECTED`);
    });
    grid.appendChild(card);
  });
}

function buildKnobs() {
  const grid = document.getElementById('knobsGrid');
  PARAMS.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'knob-wrap';
    const valId = 'val-'+p.id;
    wrap.innerHTML = `
      <div class="knob-label">${p.label} <span id="${valId}">${p.def.toFixed(2)}${p.unit}</span></div>
      <input type="range" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.def}" id="knob-${p.id}">
    `;
    grid.appendChild(wrap);
    wrap.querySelector('input').addEventListener('input', (ev) => {
      params[p.id] = parseFloat(ev.target.value);
      document.getElementById(valId).textContent = params[p.id].toFixed(2) + p.unit;
    });
  });
}

function showMsg(txt, type='') {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + type;
}

// Recording
async function startRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    showMsg('MICROPHONE ACCESS DENIED', 'err'); return;
  }

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;

  const src = audioCtx.createMediaStreamSource(mediaStream);
  src.connect(analyser);

  const dest = audioCtx.createMediaStreamDestination();
  const effect = selectedEffect;
  let cleanupFn = null;

  try {
    cleanupFn = effect.process(audioCtx, src, dest, { ...params });
  } catch(ex) {
    showMsg('EFFECT ERROR: ' + ex.message, 'err');
  }

  analyser.connect(audioCtx.destination); // monitor

  mediaRecorder = new MediaRecorder(dest.stream);
  recordedChunks = [];
  mediaRecorder.ondataavailable = e => { if(e.data.size>0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    morphedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
    document.getElementById('btnPlay').disabled = false;
    document.getElementById('btnDownload').disabled = false;
    showMsg('MORPHED AUDIO READY · PLAY OR EXPORT', 'ok');
    if(cleanupFn) cleanupFn();
    audioCtx.close();
    audioCtx = null;
    analyser = null;
    drawIdle();
  };
  mediaRecorder.start();
  isRecording = true;
  document.getElementById('btnRecord').textContent = '■ STOP';
  document.getElementById('btnRecord').classList.add('recording');
  document.getElementById('statusDot').classList.add('active');
  showMsg('RECORDING + MORPHING · ' + effect.name + ' ACTIVE');
  drawLive();
}

function stopRecording() {
  if(mediaRecorder) mediaRecorder.stop();
  if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  isRecording = false;
  document.getElementById('btnRecord').textContent = '⬤ RECORD';
  document.getElementById('btnRecord').classList.remove('recording');
  document.getElementById('statusDot').classList.remove('active');
  cancelAnimationFrame(animFrame);
}

// Visualizer
const canvas = document.getElementById('visualizer');
const ctx2 = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
}
resize();
window.addEventListener('resize', resize);

function drawIdle() {
  cancelAnimationFrame(animFrame);
  const w = canvas.width, h = canvas.height;
  ctx2.clearRect(0,0,w,h);
  ctx2.strokeStyle = 'rgba(0,255,204,0.15)';
  ctx2.lineWidth = 1;
  ctx2.beginPath();
  ctx2.moveTo(0, h/2); ctx2.lineTo(w, h/2);
  ctx2.stroke();
  // Idle noise
  ctx2.strokeStyle = 'rgba(0,255,204,0.08)';
  ctx2.beginPath();
  for(let x=0;x<w;x+=4){
    const y = h/2 + (Math.random()-0.5)*6;
    x===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
  }
  ctx2.stroke();
}

function drawLive() {
  animFrame = requestAnimationFrame(drawLive);
  if(!analyser) return;
  const w = canvas.width, h = canvas.height;
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  ctx2.fillStyle = 'rgba(10,10,18,0.6)';
  ctx2.fillRect(0,0,w,h);

  // Waveform
  const grad = ctx2.createLinearGradient(0,0,w,0);
  grad.addColorStop(0, '#6600ff');
  grad.addColorStop(0.5, '#00ffcc');
  grad.addColorStop(1, '#ff0066');
  ctx2.strokeStyle = grad;
  ctx2.lineWidth = 2 * devicePixelRatio;
  ctx2.beginPath();
  const sliceW = w / buf.length;
  let x = 0;
  for(let i=0;i<buf.length;i++){
    const v = buf[i]/128 - 1;
    const y = (v * h * 0.45) + h/2;
    i===0 ? ctx2.moveTo(x,y) : ctx2.lineTo(x,y);
    x += sliceW;
  }
  ctx2.stroke();

  // Freq bars (mini) at bottom
  analyser.getByteFrequencyData(buf);
  const bw = w / buf.length;
  for(let i=0;i<buf.length;i++){
    const bh = (buf[i]/255) * h * 0.25;
    const hue = 160 + i*0.5;
    ctx2.fillStyle = `hsla(${hue},100%,60%,0.4)`;
    ctx2.fillRect(i*bw, h-bh, bw, bh);
  }
}

drawIdle();

// Playback
function playMorphed() {
  if(!morphedBlob) return;
  const url = URL.createObjectURL(morphedBlob);
  const audio = new Audio(url);
  audio.play();
  showMsg('▶ PLAYING MORPHED OUTPUT...', 'ok');
  audio.onended = () => showMsg('PLAYBACK COMPLETE');
}

function downloadMorphed() {
  if(!morphedBlob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(morphedBlob);
  a.download = `vøicemørph_${selectedEffect.id}_${Date.now()}.webm`;
  a.click();
  showMsg('EXPORTED · CHECK YOUR DOWNLOADS', 'ok');
}

// Bind
document.getElementById('btnRecord').addEventListener('click', () => {
  if(!isRecording) startRecording();
  else stopRecording();
});
document.getElementById('btnPlay').addEventListener('click', playMorphed);
document.getElementById('btnDownload').addEventListener('click', downloadMorphed);

buildEffects();
buildKnobs();
</script>
</body>
</html>
